name: Build Debian Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Debian packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper devscripts lintian pkg-config libssl-dev libdbus-1-dev libasound2-dev

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build Debian package
      run: dpkg-buildpackage -us -uc -b

    - name: Lintian gate (errors and warnings only)
      run: |
        lintian --fail-on error,warning ../*.changes

    - name: Lintian informational report (non-blocking)
      continue-on-error: true
      run: |
        lintian -E -I --pedantic ../*.changes | tee lintian-report.txt
      
